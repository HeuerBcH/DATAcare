version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: datacare-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-datacare_db}
      POSTGRES_USER: ${DB_USER:-datacare_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_here}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-datacare_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datacare-network

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datacare-backend
    command: >
      sh -c "cd backend &&
             python manage.py migrate &&
             python manage.py createsuperuser --noinput --username admin --email admin@datacare.local || true &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 config.wsgi:application"
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here-change-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-datacare_db}
      DB_USER: ${DB_USER:-datacare_user}
      DB_PASSWORD: ${DB_PASSWORD:-secure_password_here}
      DB_HOST: postgres
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: http://frontend:3000,http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - .:/app
      - static_volume:/app/backend/staticfiles
      - media_volume:/app/backend/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - datacare-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/"]
      interval: 30s
      timeout: 10s
      retries: 5

  # React Frontend (Development)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: datacare-frontend
    environment:
      VITE_API_URL: http://backend:8000
    volumes:
      - ./src:/app/src
    ports:
      - "3000:3000"
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - datacare-network

  # Redis (Optional, for caching/sessions)
  redis:
    image: redis:7-alpine
    container_name: datacare-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - datacare-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  static_volume:
  media_volume:
  redis_data:

networks:
  datacare-network:
    driver: bridge
