services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: datacare-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-datacare_db}
      POSTGRES_USER: ${DB_USER:-datacare_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_here}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-datacare_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datacare-network

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: datacare-backend
    command: >
      sh -c "cd backend &&
             python manage.py migrate &&
             python manage.py seed_demo || true &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 config.wsgi:application"
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here-change-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-datacare_db}
      DB_USER: ${DB_USER:-datacare_user}
      DB_PASSWORD: ${DB_PASSWORD:-secure_password_here}
      DB_HOST: postgres
      DB_PORT: 5432
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@datacare.local}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin123}
      CORS_ALLOWED_ORIGINS: http://frontend:3000,http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - .:/app
      - static_volume:/app/backend/staticfiles
      - media_volume:/app/backend/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ml-trainer:
        condition: service_completed_successfully
    networks:
      - datacare-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/"]
      interval: 30s
      timeout: 10s
      retries: 5

  # React Frontend (Development)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: datacare-frontend
    environment:
      VITE_API_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - datacare-network

  # Redis (Optional, for caching/sessions)
  redis:
    image: redis:7-alpine
    container_name: datacare-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - datacare-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MLflow Tracking Server + UI
  # Lê/escreve no volume compartilhado `mlflow_data`. A UI fica em http://localhost:5000
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile
      target: ml
    image: datacare-ml:local
    container_name: datacare-mlflow
    command: >
      mlflow server
        --backend-store-uri file:///mlflow/mlruns
        --artifacts-destination file:///mlflow/mlruns
        --host 0.0.0.0 --port 5001
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "5001:5001"
    networks:
      - datacare-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ML Trainer — roda automaticamente no `docker compose up` (one-shot).
  # Treina RF + Árvore, registra no MLflow e salva o melhor modelo p/ serving.
  # O backend só sobe depois que este serviço termina com sucesso.
  # O ETL roda FORA do Docker: gere os parquets em data_pipeline/data/interim/
  # antes do `up` (veja data_pipeline/README.md). Sem eles, o treino cai para
  # dados sintéticos automaticamente.
  # Variáveis: FORCE_ML_TRAIN=true (sempre treina) | SKIP_ML_TRAIN=true (pula)
  ml-trainer:
    image: datacare-ml:local
    restart: "no"
    command: ["sh", "/app/scripts/docker-train.sh"]
    environment:
      MLFLOW_TRACKING_URI: file:///mlflow/mlruns
      FORCE_ML_TRAIN: ${FORCE_ML_TRAIN:-false}
      SKIP_ML_TRAIN: ${SKIP_ML_TRAIN:-false}
      ML_MAX_ROWS: ${ML_MAX_ROWS:-120000}
      # Paralelismo da busca de hiperparâmetros. Cada worker duplica os dados em
      # memória; manter baixo evita OOM no Docker (8GB). Aumente se tiver +RAM.
      ML_N_JOBS: ${ML_N_JOBS:-2}
    volumes:
      - .:/app
      - mlflow_data:/mlflow
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - datacare-network

  # Dashboard Streamlit — visualizações de ETL + modelos.
  # REUSA a imagem de ML (datacare-ml:local), que já traz streamlit/plotly via
  # requirements.txt — não precisa de Dockerfile/imagem próprios. Só muda o comando.
  # Sobe SÓ depois que o ml-trainer conclui: (1) libera RAM durante o treino
  # (evita disputar memória e contribuir p/ OOM) e (2) evita abrir o dashboard
  # com as views de ML vazias antes do primeiro treino.
  dashboard:
    image: datacare-ml:local
    container_name: datacare-dashboard
    command: >
      streamlit run data_pipeline/dashboard/app.py
        --server.port=8501 --server.address=0.0.0.0
        --server.headless=true --browser.gatherUsageStats=false
    environment:
      DATACARE_PIPELINE_DIR: /app/data_pipeline
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    depends_on:
      ml-trainer:
        condition: service_completed_successfully
    networks:
      - datacare-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Banner informativo — imprime as portas/URLs quando a stack está pronta.
  # Sobe por último (depende dos serviços de UI ficarem saudáveis) e sai (one-shot).
  # Aparece no `docker compose up` ou via `docker compose logs ports-info`.
  ports-info:
    image: busybox:1.36
    container_name: datacare-ports-info
    restart: "no"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
      dashboard:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        echo ""
        echo "=================================================================="
        echo "   DATAcare — stack no ar! Portas e URLs:"
        echo "=================================================================="
        echo "   Backend   (API Django)    ->  http://localhost:8000"
        echo "   Frontend  (React/Vite)    ->  http://localhost:3000"
        echo "   Dashboard (Streamlit)     ->  http://localhost:8501"
        echo "   MLflow UI (experimentos)  ->  http://localhost:5001"
        echo "   PostgreSQL                ->  localhost:5432"
        echo "   Redis                     ->  localhost:6379"
        echo "=================================================================="
        echo ""
    networks:
      - datacare-network

volumes:
  postgres_data:
  static_volume:
  media_volume:
  redis_data:
  mlflow_data:

networks:
  datacare-network:
    driver: bridge
